<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            border-collapse: collapse;
            width: 300px;
            height: 300px;
        }

        td {
            border: 1px solid black;
            padding: 5px;
            text-align: center;
            vertical-align: bottom;
        }

        .numero {
            text-align: right;
        }

    </style>
</head>
<body>
    <main>
        <h1>Minha primeira Tabela</h1>
        <!--
            hierarquia de tabela
            table -> tabela
                tr -> table row
                    td -> table data
        -->
        <table>
            <tr> <!--Primeira linha-->
                <td>A1</td>
                <td>B1</td>
                <td>C1</td>
            </tr>

            <tr> <!--Segunda linha-->
                <td>A2</td>
                <td>B2</td>
                <td class="numero">200</td>
            </tr>

            <tr> <!--Terceira linha-->
                <td>A3</td>
                <td>B3</td>
                <td class="numero">300</td>
            </tr>

            <tr> <!--Quarta linha-->
                <td>A4</td>
                <td>B4</td>
                <td>C4</td>
            </tr>
        </table>
    </main>
</body>
</html>
