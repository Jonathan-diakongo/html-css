<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centralizando uma caixa</title>
    <style>

        #container {
            height: 500px;
            background-image: url(image/target001.png);
            background-size: 100% 100%;
            background-color: blueviolet;
            padding: 10px;
            position: relative;
        }

        #conteudo {
            height: 200px;
            background-image: url(image/target001.png);
            background-size: 100% 100%;
            width: 400px;
            background-color: yellow;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <article id="container">
        <section id="conteudo">

        </section>
    </article>
</body>
</html>
